<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <meta content="noindex,nofollow" name="robots"/>
  <title>
   Masuk - NiagaBio
  </title>
  <meta content="NiagaBio adalah link bio + katalog produk untuk seller dan UMKM." name="description"/>
  <link href="assets/img/logo.jpg" rel="icon"/>
  <link href="https://cdn.jsdelivr.net" rel="preconnect"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="assets/css/main.css" rel="stylesheet"/>
   <link rel="manifest" href="site.webmanifest">
</head>
 <body class="auth-shell">
  <div class="container py-5">
   <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-7 col-lg-5">
     <div class="text-center mb-4">
      <a href="/">
       <img alt="NiagaBio" class="nb-logo" src="assets/img/logo.jpg"/>
      </a>
      <h1 class="h3 fw-black mt-3">
       Masuk ke Dashboard
      </h1>
      <p class="text-muted">
       Masuk ke dashboard NiagaBio kamu.
      </p>
     </div>
     <div class="auth-card">
      <form id="loginForm">
       <div class="mb-3">
        <label class="form-label">
         Email
        </label>
        <input class="form-control" id="loginEmail" required="" type="email"/>
       </div>
       <div class="mb-4">
        <label class="form-label">
         Password
        </label>
        <input class="form-control" id="loginPassword" required="" type="password"/>
       </div>
       <button class="btn btn-nb w-100" type="submit">
        Masuk
       </button>
      </form>
      <p class="text-center mt-4 mb-0">
       Belum punya akun?
       <a class="fw-bold text-green" href="register">
        Daftar Gratis
       </a>
      </p>
     </div>
    </div>
   </div>
  </div>
  <script defer="" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
  <script defer="" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script defer="" src="assets/js/config.js">
  </script>
  <script defer="" src="assets/js/supabase-client.js">
  </script>
  <script defer="" src="assets/js/common.js">
  </script>
  <script defer="" src="assets/js/auth.js">
  </script>
 </body>
</html>

<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <meta content="noindex,nofollow" name="robots"/>
  <title>
   Link Custom - NiagaBio
  </title>
  <meta content="NiagaBio adalah link bio dan katalog produk untuk UMKM." name="description"/>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
<link href="https://cdn.jsdelivr.net" rel="preconnect"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="assets/css/main.css" rel="stylesheet"/>
</head>
 <body data-protected="true">
  <div class="app-shell">
   <aside class="sidebar">
    <div class="d-flex align-items-center gap-2 mb-4">
     <img alt="NiagaBio" class="nb-logo-sm" src="assets/img/logo.jpg"/>
     <span class="h4 fw-black text-green mb-0">
      NiagaBio
     </span>
    </div>
    <nav>
     <a class="side-link" data-nav="dashboard" href="dashboard">
      <i class="bi bi-grid-1x2">
      </i>
      Dashboard
     </a>
     <a class="side-link" data-nav="profile" href="profile">
      <i class="bi bi-person">
      </i>
      Profil
     </a>
     <a class="side-link" data-nav="products" href="products">
      <i class="bi bi-bag">
      </i>
      Produk
     </a>
     <a class="side-link" data-nav="links" href="links">
      <i class="bi bi-link-45deg">
      </i>
      Link Custom
     </a>
     <a class="side-link" data-nav="social" href="social">
      <i class="bi bi-share">
      </i>
      Sosial Media
     </a>
     <a class="side-link" data-nav="gallery" href="gallery">
      <i class="bi bi-images">
      </i>
      Gallery
     </a>
     <a class="side-link" data-nav="themes" href="themes">
      <i class="bi bi-palette">
      </i>
      Tema
     </a>
     <a class="side-link" data-nav="checkout" href="checkout-settings">
      <i class="bi bi-qr-code">
      </i>
      Checkout
     </a>
     <a class="side-link" data-nav="orders" href="orders">
      <i class="bi bi-receipt">
      </i>
      Pesanan
     </a>
     <a class="side-link" data-nav="upgrade" href="upgrade">
      <i class="bi bi-stars">
      </i>
      Upgrade
     </a>
     <a class="side-link d-none" data-admin-only="" data-nav="admin" href="admin">
      <i class="bi bi-shield-lock">
      </i>
      Admin
     </a>
     <hr/>
     <a class="side-link" href="u?username=demo" target="_blank">
      <i class="bi bi-eye">
      </i>
      Preview Toko
     </a>
     <a class="side-link text-danger" data-logout="" href="#">
      <i class="bi bi-box-arrow-right">
      </i>
      Keluar
     </a>
    </nav>
   </aside>
   <main class="main-content">
    <header class="topbar">
     <div class="d-flex align-items-center gap-2">
      <button class="btn btn-outline-nb d-lg-none" data-sidebar-toggle="">
       <i class="bi bi-list">
       </i>
      </button>
      <div>
       <h1 class="h4 fw-black mb-0">
        Link Custom
       </h1>
       <small class="text-muted">
        Upgrade paket toko kamu
       </small>
      </div>
     </div>
     <span class="badge-soft" data-plan="">
      Free
     </span>
    </header>
    <div class="content-wrap">
     <div class="row g-4">
      <div class="col-lg-4">
       <div class="card-nb p-4">
        <h2 class="h5 fw-bold mb-1">
         Link Custom
        </h2>
        <p class="small text-muted mb-4" id="linkLimitInfo">
        </p>
        <form id="linkForm">
         <div class="mb-3">
          <label class="form-label">
           Judul link
          </label>
          <input class="form-control" id="linkTitle" required=""/>
         </div>
         <div class="mb-3">
          <label class="form-label">
           URL
          </label>
          <input class="form-control" id="linkUrl" required="" type="url"/>
         </div>
         <div class="mb-3">
          <label class="form-label">
           Logo/Icon link
          </label>
          <input class="form-control" id="linkIcon" list="linkIconOptions" placeholder="Otomatis dari URL" value="bi-link-45deg"/>
          <datalist id="linkIconOptions">
           <option value="bi-whatsapp"></option>
           <option value="bi-instagram"></option>
           <option value="bi-tiktok"></option>
           <option value="bi-bag-heart"></option>
           <option value="bi-shop-window"></option>
           <option value="bi-geo-alt"></option>
           <option value="bi-globe2"></option>
          </datalist>
          <div class="form-text">
           Isi URL WhatsApp/Shopee/Tokopedia/Instagram, logo akan terdeteksi otomatis.
          </div>
         </div>
         <div class="form-check mb-3">
          <input checked="" class="form-check-input" id="linkActive" type="checkbox"/>
          <label class="form-check-label">
           Aktif
          </label>
         </div>
         <div class="d-grid gap-2">
          <button class="btn btn-nb" type="submit">
           Simpan Link
          </button>
          <button class="btn btn-outline-nb" id="resetLink" type="button">
           Reset
          </button>
         </div>
        </form>
       </div>
      </div>
      <div class="col-lg-8">
       <div class="card-nb p-4">
        <h2 class="h5 fw-bold mb-3">
         Daftar Link
        </h2>
        <div class="table-responsive">
         <table class="table">
          <thead>
           <tr>
            <th>
             Judul
            </th>
            <th>
             URL
            </th>
            <th>
             Status
            </th>
            <th>
            </th>
           </tr>
          </thead>
          <tbody id="linkRows">
          </tbody>
         </table>
        </div>
       </div>
      </div>
     </div>
    </div>
   </main>
  </div>
  <script defer="" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
  <script defer="" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script defer="" src="assets/js/config.js">
  </script>
  <script defer="" src="assets/js/supabase-client.js">
  </script>
  <script defer="" src="assets/js/common.js">
  </script>
  <script defer="" src="assets/js/links.js">
  </script>
 </body>
</html>

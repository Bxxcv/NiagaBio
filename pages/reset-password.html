<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Reset Password - NiagaBio</title>
  <meta name="description" content="Buat password baru akun NiagaBio.">
  <link rel="icon" href="/favicon.ico?v=4" sizes="any">
  <link rel="shortcut icon" href="/favicon.ico?v=4" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/icons/favicon-32x32.png?v=4">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/icons/favicon-16x16.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/icons/apple-touch-icon.png?v=4">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="auth-shell">
  <div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-7 col-lg-5">
        <div class="text-center mb-4">
          <a href="/">
            <img alt="NiagaBio" class="nb-logo" src="/assets/img/brand/logo.png">
          </a>
          <h1 class="h3 fw-black mt-3">Buat Password Baru</h1>
          <p class="text-muted">Masukkan password baru setelah membuka link reset dari email.</p>
        </div>
        <div class="auth-card">
          <form id="passwordResetForm">
            <div class="mb-3">
              <label class="form-label" for="newPassword">Password baru</label>
              <input class="form-control" id="newPassword" minlength="6" required type="password" autocomplete="new-password">
            </div>
            <div class="mb-4">
              <label class="form-label" for="confirmPassword">Ulangi password baru</label>
              <input class="form-control" id="confirmPassword" minlength="6" required type="password" autocomplete="new-password">
            </div>
            <button class="btn btn-nb w-100" type="submit">
              Simpan Password Baru
            </button>
          </form>
          <p class="text-center mt-4 mb-0">
            Sudah ingat password?
            <a class="fw-bold text-green" href="login">Masuk</a>
          </p>
        </div>
      </div>
    </div>
  </div>
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/config.js"></script>
  <script defer src="/assets/js/supabase-client.js"></script>
  <script defer src="/assets/js/common.js"></script>
  <script defer src="/assets/js/auth.js"></script>
</body>
</html>

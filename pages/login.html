<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <meta content="noindex,nofollow" name="robots"/>
  <title>
   Masuk - NiagaBio
  </title>
  <meta content="NiagaBio adalah link bio dan katalog produk untuk UMKM." name="description"/>
  <link rel="icon" href="/favicon.ico?v=4" sizes="any">
  <link rel="shortcut icon" href="/favicon.ico?v=4" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/icons/favicon-32x32.png?v=4">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/icons/favicon-16x16.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/icons/apple-touch-icon.png?v=4">
  <link rel="manifest" href="/site.webmanifest">
<link href="https://cdn.jsdelivr.net" rel="preconnect"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/assets/css/main.css" rel="stylesheet"/>
</head>
 <body class="auth-shell">
  <div class="container py-5">
   <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-7 col-lg-5">
     <div class="text-center mb-4">
      <a href="/">
       <img alt="NiagaBio" class="nb-logo" src="/assets/img/brand/logo.png"/>
      </a>
      <h1 class="h3 fw-black mt-3">
       Selamat Datang di Dashboard Toko kamu👋
      </h1>
      <p class="text-muted">
       Masuk ke dashboard Toko kamu.
      </p>
     </div>
     <div class="auth-card">
      <form id="loginForm">
       <div class="mb-3">
        <label class="form-label">
         Email
        </label>
        <input class="form-control" id="loginEmail" required="" type="email"/>
       </div>
       <div class="mb-3">
        <label class="form-label">
         Password
        </label>
        <input class="form-control" id="loginPassword" required="" type="password"/>
       </div>
       <div class="d-flex justify-content-end mb-4">
        <button class="btn btn-link p-0 fw-semibold text-green text-decoration-none" id="forgotPasswordToggle" type="button">
         Lupa password?
        </button>
       </div>
       <button class="btn btn-nb w-100" type="submit">
        Masuk
       </button>
      </form>
      <div class="alert alert-light border mt-4 mb-0" id="forgotPasswordBox" hidden="">
       <form id="forgotPasswordForm">
        <h2 class="h6 fw-bold mb-2">
         Minta bantuan reset password
        </h2>
        <p class="small text-muted mb-3">
         Email kamu akan masuk ke Admin Master. Admin akan mengirim link reset resmi ke email kamu.
        </p>
        <div class="mb-3">
         <label class="form-label small fw-semibold" for="forgotEmail">Email akun</label>
         <input class="form-control" id="forgotEmail" required="" type="email" placeholder="email@contoh.com"/>
        </div>
        <div class="mb-3">
         <label class="form-label small fw-semibold" for="forgotNote">Catatan opsional</label>
         <textarea class="form-control" id="forgotNote" rows="2" maxlength="300" placeholder="Contoh: saya lupa password akun toko saya"></textarea>
        </div>
        <button class="btn btn-outline-nb w-100" type="submit">
         Kirim Permintaan
        </button>
       </form>
      </div>
      <p class="text-center mt-4 mb-0">
       Belum punya akun?
       <a class="fw-bold text-green" href="register">
        Daftar Gratis
       </a>
      </p>
     </div>
    </div>
   </div>
  </div>
  <script defer="" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
  <script defer="" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script defer="" src="/assets/js/config.js">
  </script>
  <script defer="" src="/assets/js/supabase-client.js">
  </script>
  <script defer="" src="/assets/js/common.js">
  </script>
  <script defer="" src="/assets/js/auth.js">
  </script>
 </body>
</html>
